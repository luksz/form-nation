services:
  web:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped

  bot:
    build: .
    command: python -m app.telegram_bot
    env_file: .env
    environment:
      FORM_NATION_API: http://web:8477
    depends_on:
      - web
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
