<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>form-nation</title>
<style>
  :root {
    --bg: #f6f7f9; --panel: #ffffff; --border: #e2e5ea; --text: #1f2430;
    --muted: #6b7280; --accent: #2563eb; --ok: #16a34a; --warn: #d97706;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.45 -apple-system, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); }
  header { padding: 12px 20px; background: var(--panel);
           border-bottom: 1px solid var(--border); display: flex;
           align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; }
  header .meta { color: var(--muted); }
  main { display: flex; gap: 16px; padding: 16px; align-items: flex-start; }
  #viewer { flex: 1; min-width: 0; background: var(--panel);
            border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  #stage { position: relative; overflow: auto; max-height: calc(100vh - 170px); }
  #pageimg { display: block; width: 100%; height: auto; }
  #overlay { position: absolute; left: 0; top: 0; pointer-events: none; }
  #sidebar { width: 380px; flex-shrink: 0; display: flex; flex-direction: column;
             gap: 12px; max-height: calc(100vh - 110px); overflow: auto; }
  .card { background: var(--panel); border: 1px solid var(--border);
          border-radius: 8px; padding: 12px; }
  .card h2 { font-size: 13px; margin: 0 0 8px; text-transform: uppercase;
             letter-spacing: .04em; color: var(--muted); }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 6px;
           padding: 7px 14px; cursor: pointer; font-size: 13px; }
  button.secondary { background: #eef1f5; color: var(--text); }
  button:disabled { opacity: .5; cursor: default; }
  input[type=text], textarea { width: 100%; border: 1px solid var(--border);
           border-radius: 6px; padding: 6px 8px; font: inherit; }
  textarea { font-family: ui-monospace, monospace; font-size: 12px; }
  .field-row { display: flex; align-items: center; gap: 8px; padding: 5px 6px;
               border-radius: 6px; }
  .field-row:hover, .field-row.hl { background: #eef4ff; }
  .field-row label { flex: 1; min-width: 0; overflow: hidden;
               text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .field-row input[type=text] { flex: 1.2; }
  .conf { font-size: 11px; border-radius: 10px; padding: 1px 7px; color: #fff; }
  .sig { color: var(--warn); font-size: 12px; }
  .pagebtns { display: flex; gap: 6px; align-items: center; margin-bottom: 8px;
              flex-wrap: wrap; }
  .tier { background: #dcfce7; color: #166534; border-radius: 10px;
          padding: 2px 10px; font-size: 12px; }
  #drop { border: 2px dashed var(--border); border-radius: 10px; padding: 60px;
          text-align: center; color: var(--muted); margin: 40px auto;
          max-width: 520px; background: var(--panel); cursor: pointer; }
  #drop.over { border-color: var(--accent); color: var(--accent); }
  #busy { display: none; align-items: center; gap: 8px; color: var(--accent);
          font-weight: 600; }
  #busy.on { display: inline-flex; }
  #busy::before { content: ""; width: 14px; height: 14px; border-radius: 50%;
          border: 2px solid var(--accent); border-top-color: transparent;
          animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>form-nation</h1>
  <span class="meta" id="docmeta">no document loaded</span>
  <span id="tierbadge"></span>
  <span id="busy"></span>
</header>

<div id="drop">Drop a PDF form here or click to choose<br>
  <input type="file" id="fileinput" accept="application/pdf" hidden>
</div>

<main id="workspace" hidden>
  <div id="viewer">
    <div class="pagebtns">
      <button class="secondary" id="prev">◀</button>
      <span id="pageinfo"></span>
      <button class="secondary" id="next">▶</button>
      <label><input type="checkbox" id="showboxes" checked> field boxes</label>
      <label><input type="checkbox" id="showgrid"> grid overlay</label>
    </div>
    <div id="stage">
      <img id="pageimg" alt="form page">
      <canvas id="overlay"></canvas>
    </div>
  </div>

  <div id="sidebar">
    <div class="card">
      <h2>Auto-fill from profile</h2>
      <textarea id="profile" rows="7"></textarea>
      <div style="margin-top:8px; display:flex; gap:8px;">
        <button id="automap">Auto-fill</button>
        <button id="download" class="secondary">Download filled PDF</button>
      </div>
      <div id="mapresult" class="meta" style="margin-top:6px;"></div>
    </div>
    <div class="card">
      <h2>Fields (<span id="fieldcount"></span>)</h2>
      <div id="fieldlist"></div>
    </div>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);

function busy(msg) {
  $('busy').textContent = msg;
  $('busy').classList.add('on');
  for (const b of document.querySelectorAll('button')) b.disabled = true;
}
function idle() {
  $('busy').classList.remove('on');
  for (const b of document.querySelectorAll('button')) b.disabled = false;
}

let DOC = null;            // {doc_id, pages, fields, tier}
let PAGE = 0;
let VALUES = {};           // field id -> value
let CONF = {};             // field id -> {confidence, source_key}

$('profile').value = JSON.stringify({
  name: "Tan Ah Kow",
  nric: "S1234567A",
  policy_no: "PA-0012345",
  address: "Blk 123 Bedok North Ave 1 #05-67 S(460123)",
  phone: "91234567",
  email: "ahkow@example.com",
  date_of_birth: "01/02/1980",
  occupation: "Technician"
}, null, 2);

// ---- upload ----
const drop = $('drop');
drop.onclick = () => $('fileinput').click();
drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = e => { e.preventDefault(); drop.classList.remove('over');
                     if (e.dataTransfer.files[0]) upload(e.dataTransfer.files[0]); };
$('fileinput').onchange = e => e.target.files[0] && upload(e.target.files[0]);

async function upload(file) {
  busy('analysing form…');
  try {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch('/api/upload', { method: 'POST', body: fd });
    if (!res.ok) { alert((await res.json()).detail || 'upload failed'); return; }
    loadDoc(await res.json());
  } finally { idle(); }
}

// deep link: /?doc=<id> re-opens an already-uploaded document
const docParam = new URLSearchParams(location.search).get('doc');
if (docParam) {
  fetch(`/api/doc/${docParam}`).then(r => r.ok ? r.json() : null)
    .then(d => d && loadDoc(d));
}

function loadDoc(d) {
  DOC = d;
  VALUES = {}; CONF = {};
  for (const f of DOC.fields) if (f.value) VALUES[f.id] = f.value;
  PAGE = 0;
  drop.hidden = true;
  $('workspace').hidden = false;
  $('docmeta').textContent = `${DOC.filename} — ${DOC.pages.length} pages, ${DOC.fields.length} fields`;
  const tierNames = {1: ' — fillable AcroForm', 2: ' — flattened PDF (CV-detected areas)', 3: ' — scan (CV-detected areas)'};
  $('tierbadge').innerHTML = `<span class="tier">Tier ${DOC.tier}${tierNames[DOC.tier] || ''}</span>`;
  showPage();
  renderFieldList();
}

// ---- page viewer + overlays ----
const img = $('pageimg'), canvas = $('overlay'), ctx = canvas.getContext('2d');

function showPage() {
  $('pageinfo').textContent = `page ${PAGE + 1} / ${DOC.pages.length}`;
  img.src = `/api/render/${DOC.doc_id}/${PAGE}?scale=2`;
  img.onload = drawOverlay;
}
$('prev').onclick = () => { if (PAGE > 0) { PAGE--; showPage(); } };
$('next').onclick = () => { if (PAGE < DOC.pages.length - 1) { PAGE++; showPage(); } };
$('showboxes').onchange = drawOverlay;
$('showgrid').onchange = drawOverlay;
new ResizeObserver(drawOverlay).observe(img);

function drawOverlay() {
  if (!DOC || !img.naturalWidth) return;
  // canvas must match the full image size (not the scrollable viewport),
  // and use devicePixelRatio for crisp lines
  const w = img.clientWidth, h = img.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const s = w / DOC.pages[PAGE].width; // PDF points -> css px

  if ($('showgrid').checked) drawGrid(w, h);

  if ($('showboxes').checked) {
    for (const f of DOC.fields.filter(f => f.page === PAGE)) {
      const [x0, y0, x1, y1] = f.rect.map(v => v * s);
      const filled = VALUES[f.id] !== undefined && VALUES[f.id] !== '' && VALUES[f.id] !== false;
      ctx.lineWidth = f.id === HL ? 3 : 1.5;
      ctx.strokeStyle = f.type === 'Signature' ? '#d97706'
                       : filled ? '#16a34a' : '#2563eb';
      ctx.fillStyle = filled ? 'rgba(22,163,74,.10)' : 'rgba(37,99,235,.06)';
      ctx.fillRect(x0, y0, x1 - x0, y1 - y0);
      ctx.strokeRect(x0, y0, x1 - x0, y1 - y0);
      if (filled && f.type === 'Text') {
        ctx.fillStyle = '#166534';
        ctx.font = `${Math.min(12, (y1 - y0) * 0.7)}px sans-serif`;
        ctx.fillText(String(VALUES[f.id]), x0 + 3, y1 - 3, x1 - x0 - 6);
      }
    }
  }
}

function drawGrid(w, h) {
  // labelled grid — the "LLM view" for tier 2/3 vision prompting
  const step = w / 12;
  ctx.strokeStyle = 'rgba(220,38,38,.35)';
  ctx.fillStyle = 'rgba(220,38,38,.8)';
  ctx.lineWidth = 1; ctx.font = '11px monospace';
  for (let i = 0; i <= 12; i++) {
    const x = i * step;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    if (i < 12) ctx.fillText(String.fromCharCode(65 + i), x + 3, 12);
  }
  for (let y = step, r = 1; y < h; y += step, r++) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    ctx.fillText(String(r), 3, y - 3);
  }
}

// ---- field panel ----
let HL = null;
function renderFieldList() {
  const box = $('fieldlist');
  box.innerHTML = '';
  const fields = DOC.fields.filter(f => f.page === PAGE);
  $('fieldcount').textContent = `${fields.length} on this page`;
  for (const f of fields) {
    const row = document.createElement('div');
    row.className = 'field-row';
    row.onmouseenter = () => { HL = f.id; drawOverlay(); row.classList.add('hl'); };
    row.onmouseleave = () => { HL = null; drawOverlay(); row.classList.remove('hl'); };
    const label = document.createElement('label');
    label.textContent = f.name;
    label.title = f.name;
    row.appendChild(label);
    if (f.type === 'Signature') {
      row.insertAdjacentHTML('beforeend', '<span class="sig">✍ signature — manual only</span>');
    } else if (f.type === 'CheckBox') {
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !!VALUES[f.id];
      cb.onchange = () => { VALUES[f.id] = cb.checked; drawOverlay(); };
      row.appendChild(cb);
    } else {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.value = VALUES[f.id] ?? '';
      inp.oninput = () => { VALUES[f.id] = inp.value; drawOverlay(); };
      row.appendChild(inp);
      if (CONF[f.id]) {
        const c = CONF[f.id].confidence;
        const tag = document.createElement('span');
        tag.className = 'conf';
        tag.style.background = c >= 0.8 ? 'var(--ok)' : 'var(--warn)';
        tag.textContent = Math.round(c * 100) + '%';
        tag.title = 'matched profile key: ' + CONF[f.id].source_key;
        row.appendChild(tag);
      }
    }
    box.appendChild(row);
  }
}
$('prev').addEventListener('click', renderFieldList);
$('next').addEventListener('click', renderFieldList);

// ---- automap ----
$('automap').onclick = async () => {
  let profile;
  try { profile = JSON.parse($('profile').value); }
  catch { alert('Profile is not valid JSON'); return; }
  busy(DOC.tier === 1 ? 'mapping fields…' : 'mapping fields (set-of-marks)…');
  try {
    const res = await fetch(`/api/automap/${DOC.doc_id}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ profile }),
    });
    const { suggestions, engine } = await res.json();
    let n = 0;
    for (const [id, s] of Object.entries(suggestions)) {
      VALUES[id] = s.value;
      CONF[id] = s;
      n++;
    }
    $('mapresult').textContent = `${n} fields auto-filled via ${engine} — review before download`;
    renderFieldList(); drawOverlay();
  } finally { idle(); }
};

// ---- fill & download ----
$('download').onclick = async () => {
  busy('filling PDF…');
  try {
    const res = await fetch(`/api/fill/${DOC.doc_id}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: VALUES }),
    });
    if (!res.ok) { alert('fill failed'); return; }
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'filled.pdf';
    a.click();
    URL.revokeObjectURL(a.href);
  } finally { idle(); }
};
</script>
</body>
</html>
